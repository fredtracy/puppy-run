<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Run</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87ceeb;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #touch-controls {
        position: fixed;
        left: 20px;
        bottom: 20px;
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 4px;
        z-index: 10;
        touch-action: none;
        user-select: none;
      }
      #touch-controls button {
        grid-column: var(--col);
        grid-row: var(--row);
        border: none;
        border-radius: 12px;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch-controls button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      #touch-controls button[data-action='jump'] {
        background: rgba(255, 197, 74, 0.55);
      }
      #touch-controls button[data-action='jump']:active {
        background: rgba(255, 197, 74, 0.8);
      }
      .action-button {
        position: fixed;
        right: 20px;
        z-index: 10;
        width: 64px;
        height: 64px;
        border: none;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 26px;
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .action-button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      .action-button:disabled,
      .action-button.disabled {
        opacity: 0.35;
        filter: grayscale(1);
      }
      .action-button.aiming {
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.85);
      }
      #daynight-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        width: 56px;
        height: 56px;
        border: none;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #daynight-button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      #daynight-button:disabled {
        opacity: 0.5;
      }
      #daynight-fade {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
        transition: opacity 2.5s ease-in-out;
      }
      #moo-button {
        bottom: 20px;
      }
      #poop-button {
        bottom: 94px;
      }
      #dress-button {
        bottom: 168px;
      }
      #bark-button {
        bottom: 242px;
      }
      #bite-button {
        bottom: 316px;
        background: rgba(90, 10, 10, 0.55);
        position: relative;
      }
      #bite-button:active {
        background: rgba(90, 10, 10, 0.8);
      }
      /* Two snarling fangs instead of an emoji — a plain tooth read as
         dental, not menacing. */
      #bite-button::before,
      #bite-button::after {
        content: '';
        position: absolute;
        top: 17px;
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 17px solid #fff;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.5));
      }
      #bite-button::before {
        left: 13px;
        transform: rotate(6deg);
      }
      #bite-button::after {
        right: 13px;
        transform: rotate(-6deg);
      }
      #ball-button {
        bottom: 20px;
        display: none;
        align-items: center;
        justify-content: center;
      }
      #ball-button::after {
        content: '';
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ff6b5b, #d93025 55%, #8f1f16 100%);
      }
      #ball-button:active::after {
        background: radial-gradient(circle at 35% 30%, #ff6b5b, #b5251a 55%, #7a1a12 100%);
      }
      /* Fetch is Miranda-only: everyone else's skills hide when she's
         playing, and the ball button only shows up for her. */
      .miranda-mode .action-button:not(#ball-button) {
        display: none;
      }
      .miranda-mode #ball-button {
        display: flex;
      }
      #character-select {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: radial-gradient(circle at 50% 40%, rgba(40, 70, 40, 0.55), rgba(6, 10, 24, 0.88));
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.4s ease;
      }
      #character-select.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #character-select h1 {
        margin: 0;
        color: #fff;
        font-size: 28px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        letter-spacing: 0.02em;
      }
      #character-select .cards {
        display: flex;
        gap: 24px;
      }
      .character-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 18px 22px;
        border: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(4px);
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
        touch-action: manipulation;
      }
      .character-card:hover,
      .character-card:active {
        background: rgba(255, 255, 255, 0.24);
        transform: translateY(-4px) scale(1.03);
      }
      .character-card canvas {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .character-card span {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="character-select">
      <h1>Who do you want to play as?</h1>
      <div class="cards">
        <button class="character-card" id="pick-miranda" type="button">
          <canvas id="portrait-miranda" width="128" height="128"></canvas>
          <span>Miranda</span>
        </button>
        <button class="character-card" id="pick-darla" type="button">
          <canvas id="portrait-darla" width="128" height="128"></canvas>
          <span>Darla</span>
        </button>
      </div>
    </div>
    <div id="touch-controls">
      <button data-key="KeyW" style="--col:2;--row:1">&#9650;</button>
      <button data-key="KeyA" style="--col:1;--row:2">&#9664;</button>
      <button data-key="KeyS" style="--col:2;--row:3">&#9660;</button>
      <button data-key="KeyD" style="--col:3;--row:2">&#9654;</button>
      <button data-action="jump" style="--col:2;--row:2">&#8593;</button>
    </div>
    <div id="daynight-fade"></div>
    <button id="daynight-button">&#9728;&#65039;</button>
    <button id="moo-button" class="action-button">&#128046;</button>
    <button id="poop-button" class="action-button">&#128169;</button>
    <button id="dress-button" class="action-button">&#128087;</button>
    <button id="bark-button" class="action-button">&#128021;</button>
    <button id="bite-button" class="action-button"></button>
    <button id="ball-button" class="action-button"></button>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
