<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Run</title>
    <link rel="icon" id="favicon" type="image/png" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #87ceeb;
        height: 100%;
      }
      canvas {
        display: block;
      }
      #touch-controls {
        position: fixed;
        left: 20px;
        bottom: 20px;
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 4px;
        z-index: 10;
        touch-action: none;
        user-select: none;
      }
      #touch-controls button {
        grid-column: var(--col);
        grid-row: var(--row);
        border: none;
        border-radius: 12px;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 22px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
      }
      #touch-controls button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      #touch-controls button[data-action='jump'] {
        background: rgba(255, 197, 74, 0.55);
      }
      #touch-controls button[data-action='jump']:active {
        background: rgba(255, 197, 74, 0.8);
      }
      .action-button {
        position: fixed;
        right: 20px;
        z-index: 10;
        width: 64px;
        height: 64px;
        border: none;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 26px;
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .action-button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      .action-button:disabled,
      .action-button.disabled {
        opacity: 0.35;
        filter: grayscale(1);
      }
      .action-button.aiming {
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.85);
      }
      #daynight-button {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        width: 56px;
        height: 56px;
        border: none;
        border-radius: 50%;
        background: rgba(20, 20, 20, 0.45);
        color: #fff;
        font-size: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #daynight-button:active {
        background: rgba(20, 20, 20, 0.7);
      }
      #daynight-button:disabled {
        opacity: 0.5;
      }
      #daynight-fade {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
        transition: opacity 2.5s ease-in-out;
      }
      #moo-button {
        bottom: 20px;
      }
      #poop-button {
        bottom: 94px;
      }
      #dress-button {
        bottom: 168px;
      }
      #bark-button {
        bottom: 242px;
      }
      #bite-button {
        bottom: 316px;
        background: rgba(90, 10, 10, 0.55);
      }
      #bite-button:active {
        background: rgba(90, 10, 10, 0.8);
      }
      /* Two snarling fangs instead of an emoji — a plain tooth read as
         dental, not menacing. */
      #bite-button::before,
      #bite-button::after {
        content: '';
        position: absolute;
        top: 17px;
        width: 0;
        height: 0;
        border-left: 7px solid transparent;
        border-right: 7px solid transparent;
        border-top: 17px solid #fff;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.5));
      }
      #bite-button::before {
        left: 13px;
        transform: rotate(6deg);
      }
      #bite-button::after {
        right: 13px;
        transform: rotate(-6deg);
      }
      #ball-button {
        bottom: 20px;
        display: none;
        align-items: center;
        justify-content: center;
      }
      #ball-button::after {
        content: '';
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #ff6b5b, #d93025 55%, #8f1f16 100%);
      }
      #ball-button:active::after {
        background: radial-gradient(circle at 35% 30%, #ff6b5b, #b5251a 55%, #7a1a12 100%);
      }
      #cheese-button {
        bottom: 94px;
        display: none;
        align-items: center;
        justify-content: center;
      }
      #call-button {
        bottom: 168px;
        display: none;
        align-items: center;
        justify-content: center;
      }
      /* Fetch, cheese, and calling Darla over are all Miranda-only:
         everyone else's skills hide when she's playing, and only these
         show up for her. */
      .miranda-mode .action-button:not(#ball-button):not(#cheese-button):not(#call-button) {
        display: none;
      }
      .miranda-mode #ball-button {
        display: flex;
      }
      .miranda-mode #cheese-button {
        display: flex;
      }
      .miranda-mode #call-button {
        display: flex;
      }
      /* Fetch, cheese, calling Darla over, and biting are all built around
         "the other character is an AI companion" — with a real second
         player driving them instead, these are hidden for now rather than
         fighting the network-applied position every frame. */
      .multiplayer-mode #ball-button,
      .multiplayer-mode #cheese-button,
      .multiplayer-mode #call-button,
      .multiplayer-mode #bite-button {
        display: none !important;
      }
      #mp-menu,
      #character-select {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background: radial-gradient(circle at 50% 40%, rgba(40, 70, 40, 0.55), rgba(6, 10, 24, 0.88));
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        transition: opacity 0.4s ease;
      }
      #mp-menu.hidden,
      #character-select.hidden {
        opacity: 0;
        pointer-events: none;
      }
      #mp-menu h1,
      #character-select h1 {
        margin: 0;
        color: #fff;
        font-size: 28px;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        letter-spacing: 0.02em;
      }
      #mp-menu .mp-choices {
        display: flex;
        gap: 16px;
      }
      #mp-menu button {
        font-family: inherit;
        font-size: 16px;
        font-weight: 600;
        color: #fff;
        background: rgba(255, 255, 255, 0.12);
        border: none;
        border-radius: 14px;
        padding: 14px 22px;
        cursor: pointer;
        touch-action: manipulation;
        transition: transform 0.15s ease, background 0.15s ease;
      }
      #mp-menu button:hover,
      #mp-menu button:active {
        background: rgba(255, 255, 255, 0.24);
        transform: translateY(-2px);
      }
      #mp-menu .mp-panel {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        background: rgba(0, 0, 0, 0.3);
        border-radius: 18px;
        padding: 22px 28px;
        min-width: 260px;
      }
      #mp-menu .mp-panel.hidden {
        display: none;
      }
      #mp-menu .mp-panel p {
        margin: 0;
        color: #e8e2d1;
        font-size: 14px;
        text-align: center;
      }
      #mp-host-code {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: #ffd54a;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 10px 18px;
        user-select: all;
      }
      #mp-join-code {
        font-family: inherit;
        font-size: 16px;
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        width: 200px;
        text-align: center;
      }
      #mp-menu button.mp-back {
        background: transparent;
        color: #b7ab9a;
        font-size: 13px;
        font-weight: 400;
        padding: 4px 8px;
      }
      #character-select .cards {
        display: flex;
        gap: 24px;
      }
      .character-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        padding: 18px 22px;
        border: none;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(4px);
        cursor: pointer;
        transition: transform 0.15s ease, background 0.15s ease;
        touch-action: manipulation;
      }
      .character-card:hover,
      .character-card:active {
        background: rgba(255, 255, 255, 0.24);
        transform: translateY(-4px) scale(1.03);
      }
      .character-card canvas {
        width: 128px;
        height: 128px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.35);
      }
      .character-card span {
        color: #fff;
        font-size: 18px;
        font-weight: 600;
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.5);
      }
      #speech-bubble {
        position: fixed;
        left: 0;
        top: 0;
        transform: translate(-50%, -100%);
        background: rgba(255, 255, 255, 0.92);
        color: #222;
        padding: 8px 14px;
        border-radius: 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        pointer-events: none;
        z-index: 15;
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      #speech-bubble::after {
        content: '';
        position: absolute;
        left: 50%;
        bottom: -8px;
        transform: translateX(-50%);
        border: 8px solid transparent;
        border-top-color: rgba(255, 255, 255, 0.92);
      }
      #speech-bubble.visible {
        opacity: 1;
      }
      #dialogue-menu {
        position: fixed;
        left: 50%;
        bottom: 100px;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        gap: 8px;
        background: rgba(20, 20, 20, 0.85);
        border-radius: 14px;
        padding: 14px;
        z-index: 16;
        min-width: 260px;
      }
      #dialogue-menu.visible {
        display: flex;
      }
      #dialogue-menu button {
        background: rgba(255, 255, 255, 0.12);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 10px 14px;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        text-align: left;
        cursor: pointer;
      }
      #dialogue-menu button:hover,
      #dialogue-menu button:active {
        background: rgba(255, 255, 255, 0.24);
      }
      #dialogue-menu button.cancel {
        background: transparent;
        color: #b7ab9a;
        text-align: center;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="mp-menu">
      <h1>Puppy Run</h1>
      <div class="mp-choices">
        <button id="mp-solo" type="button">Play Solo</button>
        <button id="mp-host" type="button">Host a Game</button>
        <button id="mp-join" type="button">Join a Game</button>
      </div>
      <div id="mp-host-panel" class="mp-panel hidden">
        <p>Share this code with your friend:</p>
        <div id="mp-host-code">…</div>
        <p id="mp-host-status">Generating code…</p>
        <button id="mp-host-cancel" type="button" class="mp-back">Back</button>
      </div>
      <div id="mp-join-panel" class="mp-panel hidden">
        <p>Enter your friend's code:</p>
        <input id="mp-join-code" type="text" placeholder="code" autocomplete="off" spellcheck="false" />
        <button id="mp-join-connect" type="button">Connect</button>
        <p id="mp-join-status"></p>
        <button id="mp-join-cancel" type="button" class="mp-back">Back</button>
      </div>
    </div>
    <div id="character-select" class="hidden">
      <h1 id="character-select-title">Who do you want to play as?</h1>
      <div class="cards">
        <button class="character-card" id="pick-miranda" type="button">
          <canvas id="portrait-miranda" width="128" height="128"></canvas>
          <span>Miranda</span>
        </button>
        <button class="character-card" id="pick-darla" type="button">
          <canvas id="portrait-darla" width="128" height="128"></canvas>
          <span>Darla</span>
        </button>
      </div>
    </div>
    <div id="touch-controls">
      <button data-key="KeyW" style="--col:2;--row:1">&#9650;</button>
      <button data-key="KeyA" style="--col:1;--row:2">&#9664;</button>
      <button data-key="KeyS" style="--col:2;--row:3">&#9660;</button>
      <button data-key="KeyD" style="--col:3;--row:2">&#9654;</button>
      <button data-action="jump" style="--col:2;--row:2">&#8593;</button>
    </div>
    <div id="daynight-fade"></div>
    <button id="daynight-button">&#9728;&#65039;</button>
    <button id="moo-button" class="action-button">&#128046;</button>
    <button id="poop-button" class="action-button">&#128169;</button>
    <button id="dress-button" class="action-button">&#128087;</button>
    <button id="bark-button" class="action-button">&#128021;</button>
    <button id="bite-button" class="action-button"></button>
    <button id="ball-button" class="action-button"></button>
    <button id="cheese-button" class="action-button">&#129472;</button>
    <button id="call-button" class="action-button">&#128227;</button>
    <div id="speech-bubble"></div>
    <div id="dialogue-menu"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
